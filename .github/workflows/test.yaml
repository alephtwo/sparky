---
name: "Test"
on:
  push:
    branches-ignore:
      - "main"
  workflow_call:
jobs:
  test:
    name: "Run unit tests"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v6"
      - uses: "pnpm/action-setup/@v5"
        with:
          version: "latest"
      - uses: "actions/setup-node@v6"
        with:
          node-version: "lts/krypton"
          cache: "pnpm"
      - name: "Install Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Run unit tests"
        run: "pnpm test"
